name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r --if-present typecheck

      - name: Tests
        run: pnpm -r --if-present test

      - name: Build web
        run: pnpm --filter @troppaye/web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-build
          # CI d'intégration : tolère les TODO_COPY du récit. Le build de
          # DÉPLOIEMENT ne pose jamais ce flag → la prod reste bloquée tant
          # que le copy deck §7 n'est pas rempli (garde-fou notre-histoire).
          TODO_COPY_ALLOW: "1"
